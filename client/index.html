<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport with safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Cache control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>ConceptAds</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ConceptAds" />

    <!-- iOS touch icons -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png" />

    <!-- Android / theme color -->
    <meta name="theme-color" content="#08080f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ConceptAds" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="UGC маркетплейс — соединяем бренды и авторов в Казахстане" />
    <meta property="og:title" content="ConceptAds" />
    <meta property="og:description" content="UGC маркетплейс — соединяем бренды и авторов в Казахстане" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      html, body { margin: 0; padding: 0; background: #08080f; }

      /* Safe area padding for notch / home indicator */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Prevent overscroll / pull-to-refresh on iOS */
      html { overscroll-behavior: none; }

      #root-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: #08080f;
      }
      #root-loading .logo {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        background: linear-gradient(135deg, #7C3AED, #1A6BFF);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #root-loading p {
        color: rgba(255,255,255,0.4);
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="root-loading">
      <div class="logo">✦</div>
      <p>ConceptAds</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
