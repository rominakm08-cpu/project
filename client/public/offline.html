<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Нет интернета — ConceptAds</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #08080f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 70% 45% at 15% -10%, rgba(124,58,237,.2) 0%, transparent 55%),
        radial-gradient(ellipse 55% 35% at 85% 105%, rgba(26,107,255,.14) 0%, transparent 50%);
    }
    .card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }
    .icon {
      width: 88px;
      height: 88px;
      border-radius: 26px;
      background: linear-gradient(135deg, #7C3AED, #1A6BFF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin: 0 auto 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .8; transform: scale(.96); }
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.4px; }
    p { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.6; margin-bottom: 28px; }
    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #7C3AED, #9D5CF5);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(124,58,237,.4);
      transition: transform .15s, box-shadow .15s;
    }
    button:active { transform: scale(.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✦</div>
    <h1>Нет подключения</h1>
    <p>Проверьте интернет-соединение и попробуйте снова. Некоторые разделы доступны офлайн.</p>
    <button onclick="location.reload()">🔄 Обновить страницу</button>
  </div>
</body>
</html>
